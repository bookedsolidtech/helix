# ============================================================================
# CI Pipeline — HELiX Enterprise Healthcare Web Component Library
# ============================================================================
# Parallel quality gates — each job runs independently for fast feedback:
#   1. Lint (ESLint 9 flat config)
#   2. Format (Prettier)
#   3. Type check (TypeScript strict, zero errors)
#   4. Test (Vitest browser mode + Playwright Chromium)
#   5. Build + CEM + Bundle size (Vite library mode via Turborepo)
#   6. VRT (Visual regression via Storybook)
# ============================================================================

name: CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

# ── Shared setup anchor ────────────────────────────────────────────────────
# Reusable setup steps referenced by all jobs

jobs:
  # ── Change detection ───────────────────────────────────────────────────
  # Determines which jobs to run based on changed files.
  # Audit-only PRs (AUDIT.md files) skip Test and VRT.

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      source: ${{ steps.filter.outputs.source }}
      is_audit: ${{ steps.check-audit.outputs.is_audit }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if audit branch
        id: check-audit
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH" == *"deep-audit"* ]] || [[ "$BRANCH" == *"audit/"* ]]; then
            echo "is_audit=true" >> "$GITHUB_OUTPUT"
            echo "Audit branch detected: $BRANCH — skipping CI"
          else
            echo "is_audit=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - 'packages/hx-library/src/**/*.ts'
              - 'packages/hx-library/src/**/*.styles.ts'
              - 'packages/hx-library/vite.config.ts'
              - 'packages/hx-library/tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/**'

  # ── Fast checks (no build needed, <30s each) ────────────────────────────

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  type-check:
    name: Type Check
    needs: changes
    if: needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run type-check --filter='!docs'

  # ── Tests (need Playwright browsers) ────────────────────────────────────
  # Changed-file mode: only runs tests for components touched in this PR/push.
  # A single-component PR runs ~20-50 tests in <2 min instead of 3,200+ tests.
  # Full suite only runs when triggered manually or on a scheduled basis.

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.source == 'true' && needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run build --filter='!docs'
      - run: npx playwright install --with-deps chromium
      - name: Run tests (PR — path-filtered by changed components)
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.head_ref }}"
          # Fast path: audit-fix branches encode the component name directly
          if [[ "$BRANCH" =~ feature/audit-fix-(hx-[a-z-]+) ]]; then
            COMPONENT="${BASH_REMATCH[1]}"
            echo "Audit-fix branch — running tests for: $COMPONENT"
            npx vitest run "src/components/$COMPONENT/"
          else
            # General PR: extract changed component dirs from git diff
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep 'src/components/hx-' \
              | sed 's|.*src/components/\(hx-[^/]*\)/.*|\1|' \
              | sort -u)
            if [ -z "$CHANGED" ]; then
              echo "No component changes — skipping tests"
              exit 0
            fi
            PATHS=$(echo "$CHANGED" | sed 's|^|src/components/|' | sed 's|$|/|' | tr '\n' ' ')
            echo "Running tests for: $PATHS"
            npx vitest run $PATHS
          fi
        working-directory: packages/hx-library
      - name: Run tests (push — path-filtered by merged changes)
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1...HEAD \
            | grep 'src/components/hx-' \
            | sed 's|.*src/components/\(hx-[^/]*\)/.*|\1|' \
            | sort -u)
          if [ -z "$CHANGED" ]; then
            echo "No component changes — skipping tests"
            exit 0
          fi
          PATHS=$(echo "$CHANGED" | sed 's|^|src/components/|' | sed 's|$|/|' | tr '\n' ' ')
          echo "Running tests for: $PATHS"
          npx vitest run $PATHS
        working-directory: packages/hx-library
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/hx-library/.cache/test-results.json
          retention-days: 30
          if-no-files-found: warn

  # ── Build + CEM + Bundle size ───────────────────────────────────────────

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run build --filter='!docs'
      - run: npm run cem
      - name: Validate package exports (npm pack --dry-run)
        run: npm pack --dry-run
        working-directory: packages/hx-library
      - name: Bundle size check
        run: |
          echo "=== Bundle Size Report ==="
          echo ""

          EXIT_CODE=0

          # Per-component budget: 5KB (5120 bytes) gzipped
          COMPONENT_BUDGET=5120
          # Full bundle budget: 50KB (51200 bytes) gzipped
          BUNDLE_BUDGET=51200

          # Check individual component entry points
          for component in hx-button hx-card hx-text-input hx-alert hx-badge hx-checkbox hx-container hx-form hx-prose hx-radio-group hx-select hx-switch hx-textarea; do
            file="packages/hx-library/dist/components/${component}/index.js"
            if [ -f "$file" ]; then
              raw_size=$(wc -c < "$file" | tr -d ' ')
              gzip_size=$(gzip -c "$file" | wc -c | tr -d ' ')
              raw_kb=$(echo "scale=2; $raw_size / 1024" | bc)
              gzip_kb=$(echo "scale=2; $gzip_size / 1024" | bc)

              if [ "$gzip_size" -gt "$COMPONENT_BUDGET" ]; then
                echo "FAIL ${component}: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 5KB gzipped)"
                EXIT_CODE=1
              else
                echo "PASS ${component}: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 5KB gzipped)"
              fi
            else
              echo "SKIP ${component}: no per-component entry point at ${file}"
            fi
          done

          echo ""

          # Check full bundle
          full="packages/hx-library/dist/index.js"
          if [ -f "$full" ]; then
            raw_size=$(wc -c < "$full" | tr -d ' ')
            gzip_size=$(gzip -c "$full" | wc -c | tr -d ' ')
            raw_kb=$(echo "scale=2; $raw_size / 1024" | bc)
            gzip_kb=$(echo "scale=2; $gzip_size / 1024" | bc)

            if [ "$gzip_size" -gt "$BUNDLE_BUDGET" ]; then
              echo "FAIL Full bundle: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 50KB gzipped)"
              EXIT_CODE=1
            else
              echo "PASS Full bundle: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 50KB gzipped)"
            fi
          else
            echo "ERROR: Full bundle not found at ${full}"
            EXIT_CODE=1
          fi

          echo ""
          echo "=== End Bundle Size Report ==="

          exit $EXIT_CODE

  # ── Visual Regression Tests ─────────────────────────────────────────────

  vrt:
    name: Visual Regression
    needs: changes
    if: >
      needs.changes.outputs.source == 'true' &&
      needs.changes.outputs.is_audit != 'true' &&
      !contains(github.head_ref || github.ref_name, 'audit-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Detect changed components
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep 'src/components/hx-' \
              | sed 's|.*src/components/\(hx-[^/]*\)/.*|\1|' \
              | sort -u \
              | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD \
              | grep 'src/components/hx-' \
              | sed 's|.*src/components/\(hx-[^/]*\)/.*|\1|' \
              | sort -u \
              | tr '\n' ',' | sed 's/,$//')
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No component source changes — VRT will skip"
          else
            echo "VRT scoped to: $CHANGED"
          fi
      - run: npm ci
        if: steps.detect.outputs.changed != ''
      - run: npx playwright install --with-deps chromium firefox webkit
        if: steps.detect.outputs.changed != ''
      - name: Restore VRT baselines
        if: steps.detect.outputs.changed != ''
        id: vrt-cache
        uses: actions/cache@v4
        with:
          path: packages/hx-library/__screenshots__
          key: vrt-screenshots-${{ hashFiles('packages/hx-library/src/**/*.ts') }}
          restore-keys: |
            vrt-screenshots-
      - run: npm run build:storybook
        if: steps.detect.outputs.changed != ''
      - name: Serve Storybook and run VRT
        if: steps.detect.outputs.changed != ''
        env:
          CHANGED_COMPONENTS: ${{ steps.detect.outputs.changed }}
        run: |
          npx http-server apps/storybook/dist -p 3151 &
          sleep 5
          # If no cached baselines exist, run in update mode to create them (first-run pass)
          if [ ! -d "packages/hx-library/__screenshots__" ] || [ -z "$(ls -A packages/hx-library/__screenshots__ 2>/dev/null)" ]; then
            echo "No VRT baselines found — creating initial baselines"
            npm run test:vrt:update
          else
            npm run test:vrt
          fi
      - name: Upload VRT diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diffs
          path: packages/hx-library/.cache/vrt-results/
          retention-days: 7
          if-no-files-found: warn

  # ── Security Audit ──────────────────────────────────────────────────────

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.is_audit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical

  # ── Aggregate gate (for branch protection) ──────────────────────────────
  # This job depends on all checks and is the single required status check
  # in branch protection. This avoids needing to update branch protection
  # every time a job name changes.

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [changes, lint, format, type-check, test, build, vrt, audit]
    if: always()
    steps:
      - name: Check all gates
        run: |
          IS_AUDIT="${{ needs.changes.outputs.is_audit }}"

          echo "Audit branch: $IS_AUDIT"
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Format:     ${{ needs.format.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Test:       ${{ needs.test.result }}"
          echo "Build:      ${{ needs.build.result }}"
          echo "VRT:        ${{ needs.vrt.result }}"
          echo "Audit:      ${{ needs.audit.result }}"

          # Audit branches skip all CI — auto-pass
          if [[ "$IS_AUDIT" == "true" ]]; then
            echo "Audit branch — all gates skipped. Auto-pass."
            exit 0
          fi

          FAIL=0

          for gate in lint format type-check build audit; do
            result="${{ needs.lint.result }}"
            case "$gate" in
              lint)       result="${{ needs.lint.result }}" ;;
              format)     result="${{ needs.format.result }}" ;;
              type-check) result="${{ needs.type-check.result }}" ;;
              build)      result="${{ needs.build.result }}" ;;
              audit)      result="${{ needs.audit.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::Gate '$gate' did not succeed: $result"
              FAIL=1
            fi
          done

          # Test and VRT are allowed to be skipped (no source changes)
          for gate in test vrt; do
            result="${{ needs.test.result }}"
            case "$gate" in
              test) result="${{ needs.test.result }}" ;;
              vrt)  result="${{ needs.vrt.result }}" ;;
            esac
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Gate '$gate' did not succeed: $result"
              FAIL=1
            fi
          done

          if [[ "$FAIL" -eq 1 ]]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi

          echo "All quality gates passed!"
