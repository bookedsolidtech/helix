# ============================================================================
# CI Pipeline — wc-2026 Enterprise Healthcare Web Component Library
# ============================================================================
# Enforces all 7 quality gates before merge:
#   1. Type check (TypeScript strict, zero errors)
#   2. Lint (ESLint 9 flat config)
#   3. Format (Prettier)
#   4. Test (Vitest browser mode + Playwright Chromium)
#   5. Build (Vite library mode via Turborepo)
#   6. CEM (Custom Elements Manifest generation)
#   7. Bundle size (per-component <5KB gzipped, full bundle <50KB gzipped)
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ---- Setup ----

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ---- Quality Checks ----

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # ---- Tests ----

      - name: Test
        run: npm run test:library

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/wc-library/.cache/test-results.json
          retention-days: 30
          if-no-files-found: warn

      # ---- Build ----

      - name: Build
        run: npm run build

      - name: Generate Custom Elements Manifest
        run: npm run cem

      # ---- Bundle Size Check ----

      - name: Bundle size check
        run: |
          echo "=== Bundle Size Report ==="
          echo ""

          EXIT_CODE=0

          # Per-component budget: 5KB (5120 bytes) gzipped
          COMPONENT_BUDGET=5120
          # Full bundle budget: 50KB (51200 bytes) gzipped
          BUNDLE_BUDGET=51200

          # Check individual component entry points
          for component in wc-button wc-card wc-text-input; do
            file="packages/wc-library/dist/components/${component}/index.js"
            if [ -f "$file" ]; then
              raw_size=$(wc -c < "$file" | tr -d ' ')
              gzip_size=$(gzip -c "$file" | wc -c | tr -d ' ')
              raw_kb=$(echo "scale=2; $raw_size / 1024" | bc)
              gzip_kb=$(echo "scale=2; $gzip_size / 1024" | bc)

              if [ "$gzip_size" -gt "$COMPONENT_BUDGET" ]; then
                echo "FAIL ${component}: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 5KB gzipped)"
                EXIT_CODE=1
              else
                echo "PASS ${component}: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 5KB gzipped)"
              fi
            else
              echo "SKIP ${component}: no per-component entry point at ${file}"
            fi
          done

          echo ""

          # Check full bundle
          full="packages/wc-library/dist/index.js"
          if [ -f "$full" ]; then
            raw_size=$(wc -c < "$full" | tr -d ' ')
            gzip_size=$(gzip -c "$full" | wc -c | tr -d ' ')
            raw_kb=$(echo "scale=2; $raw_size / 1024" | bc)
            gzip_kb=$(echo "scale=2; $gzip_size / 1024" | bc)

            if [ "$gzip_size" -gt "$BUNDLE_BUDGET" ]; then
              echo "FAIL Full bundle: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 50KB gzipped)"
              EXIT_CODE=1
            else
              echo "PASS Full bundle: ${raw_kb}KB raw / ${gzip_kb}KB gzipped (budget: 50KB gzipped)"
            fi
          else
            echo "ERROR: Full bundle not found at ${full}"
            EXIT_CODE=1
          fi

          echo ""
          echo "=== End Bundle Size Report ==="

          exit $EXIT_CODE
