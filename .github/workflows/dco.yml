# ============================================================================
# DCO (Developer Certificate of Origin) Check
# ============================================================================
# Ensures all commits from external contributors include a
# `Signed-off-by` line (DCO sign-off via `git commit -s`).
#
# Org members are exempt — only non-org PRs are blocked.
# See: https://developercertificate.org/
# ============================================================================

name: DCO

on:
  pull_request:
    branches: [main, dev, staging]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: DCO Sign-Off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: tim-actions/dco@v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
