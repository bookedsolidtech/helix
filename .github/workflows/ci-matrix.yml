# ============================================================================
# Matrix CI Pipeline — wc-2026 Enterprise Healthcare Web Component Library
# ============================================================================
# Tests across multiple Node.js versions and operating systems to ensure
# compatibility and reliability across different environments.
# ============================================================================

name: CI Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-test:
    name: Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest]

    steps:
      # ---- Setup ----

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ---- Quality Checks ----

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # ---- Build (must run before tests — @helix/tokens exports from dist/) ----

      - name: Build
        run: npx turbo run build --filter='!docs' --filter='!@helix/storybook'

      # ---- Tests ----

      - name: Test
        run: |
          # Promotion PRs (staging→main): tests already verified on staging — skip
          if [[ "${{ github.head_ref }}" == "staging" && "${{ github.base_ref }}" == "main" ]]; then
            echo "Promotion PR (staging → main) — skipping matrix tests"
            exit 0
          fi
          npm run test

      - name: Generate Custom Elements Manifest
        run: npm run cem

      # ---- Upload Results ----

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-node${{ matrix.node-version }}
          path: packages/hx-library/.cache/test-results.json
          retention-days: 7
          if-no-files-found: warn

  matrix-summary:
    name: Matrix Test Summary
    runs-on: ubuntu-latest
    needs: matrix-test
    if: always()

    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.matrix-test.result }}" == "failure" ]; then
            echo "❌ Matrix tests failed"
            exit 1
          else
            echo "✅ All matrix tests passed"
          fi
