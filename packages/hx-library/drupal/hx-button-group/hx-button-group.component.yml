$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json'
name: Helix Button Group
description: 'A container component that groups related hx-button elements into a cohesive horizontal or vertical action set. Eliminates double borders between adjacent buttons and squares off inner border-radius for a unified visual appearance.'
status: experimental
group: helix

props:
  type: object
  properties:
    orientation:
      type: string
      title: Orientation
      description: 'Layout orientation of the button group.'
      default: 'horizontal'
      enum:
        - 'horizontal'
        - 'vertical'
    hx-size:
      type: string
      title: Hx-size
      description: 'Size applied to the button group and cascaded to child buttons via the --hx-button-group-size CSS custom property.'
      default: 'md'
      enum:
        - 'sm'
        - 'md'
        - 'lg'

slots:
  default:
    title: Default
    description: 'Default slot accepting hx-button and hx-icon-button children.'
