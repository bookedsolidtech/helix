$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json'
name: Helix Slider
description: 'A range slider component for selecting a numeric value within a min/max boundary. Supports tick marks, value display, range labels, and native form participation via ElementInternals.'
status: experimental
group: helix

props:
  type: object
  properties:
    name:
      type: string
      title: Name
      description: 'The name submitted with the form.'
      default: ''
    value:
      type: number
      title: Value
      description: 'The current numeric value of the slider.'
      default: 0
    min:
      type: number
      title: Min
      description: 'The minimum allowed value.'
      default: 0
    max:
      type: number
      title: Max
      description: 'The maximum allowed value.'
      default: 100
    step:
      type: number
      title: Step
      description: 'The stepping interval between values.'
      default: 1
    disabled:
      type: boolean
      title: Disabled
      description: 'Whether the slider is disabled.'
      default: false
    label:
      type: string
      title: Label
      description: 'The visible label text for the slider.'
      default: ''
    help-text:
      type: string
      title: Help-text
      description: 'Help text displayed below the slider for guidance.'
      default: ''
    show-value:
      type: boolean
      title: Show-value
      description: 'When true, the current value is shown next to the label.'
      default: false
    show-ticks:
      type: boolean
      title: Show-ticks
      description: 'When true, tick marks are rendered at each step interval.'
      default: false
    hx-size:
      type: string
      title: Hx-size
      description: 'The size variant of the slider.'
      default: 'md'
      enum:
        - 'sm'
        - 'md'
        - 'lg'

slots:
  label:
    title: Label
    description: 'Custom label content (overrides the label property).'
  help:
    title: Help
    description: 'Custom help text content (overrides the helpText property).'
  min-label:
    title: Min-label
    description: 'Label rendered at the minimum end of the slider.'
  max-label:
    title: Max-label
    description: 'Label rendered at the maximum end of the slider.'
