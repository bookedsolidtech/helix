$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json'
name: Helix Radio
description: 'An individual radio button, designed to be used inside a `<hx-radio-group>`.'
status: experimental
group: helix

props:
  type: object
  properties:
    value:
      type: string
      title: Value
      description: 'The value this radio represents.'
      default: ''
    label:
      type: string
      title: Label
      description: 'Visible label text for the radio.'
      default: ''
    disabled:
      type: boolean
      title: Disabled
      description: 'Whether this radio is disabled.'
      default: false
    checked:
      type: boolean
      title: Checked
      description: 'Whether this radio is checked. Managed by the parent group.'
      default: false

slots:
  default:
    title: Default
    description: 'Custom label content (overrides the label property).'
