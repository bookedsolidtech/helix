<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient-1-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logo-gradient-2-light" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#db2777;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#db2777;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="logo-glow-light">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- DNA Helix -->
  <g transform="translate(20, 0)">
    <!-- Left strand -->
    <path d="M 25,0 Q 10,25 25,50 T 25,100 T 25,150 T 25,200"
          stroke="url(#logo-gradient-1-light)" stroke-width="3" fill="none" filter="url(#logo-glow-light)" stroke-linecap="round"/>

    <!-- Right strand -->
    <path d="M 75,0 Q 90,25 75,50 T 75,100 T 75,150 T 75,200"
          stroke="url(#logo-gradient-2-light)" stroke-width="3" fill="none" filter="url(#logo-glow-light)" stroke-linecap="round"/>

    <!-- Base pairs -->
    <line x1="25" y1="12.5" x2="75" y2="12.5" stroke="url(#logo-gradient-1-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="37.5" x2="75" y2="37.5" stroke="url(#logo-gradient-2-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="62.5" x2="75" y2="62.5" stroke="url(#logo-gradient-1-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="87.5" x2="75" y2="87.5" stroke="url(#logo-gradient-2-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="112.5" x2="75" y2="112.5" stroke="url(#logo-gradient-1-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="137.5" x2="75" y2="137.5" stroke="url(#logo-gradient-2-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="162.5" x2="75" y2="162.5" stroke="url(#logo-gradient-1-light)" stroke-width="2" opacity="0.5"/>
    <line x1="25" y1="187.5" x2="75" y2="187.5" stroke="url(#logo-gradient-2-light)" stroke-width="2" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="25" cy="0" r="4" fill="url(#logo-gradient-1-light)" filter="url(#logo-glow-light)"/>
    <circle cx="75" cy="0" r="4" fill="url(#logo-gradient-2-light)" filter="url(#logo-glow-light)"/>
    <circle cx="25" cy="50" r="4" fill="url(#logo-gradient-1-light)" filter="url(#logo-glow-light)"/>
    <circle cx="75" cy="50" r="4" fill="url(#logo-gradient-2-light)" filter="url(#logo-glow-light)"/>
    <circle cx="25" cy="100" r="4" fill="url(#logo-gradient-1-light)" filter="url(#logo-glow-light)"/>
    <circle cx="75" cy="100" r="4" fill="url(#logo-gradient-2-light)" filter="url(#logo-glow-light)"/>
    <circle cx="25" cy="150" r="4" fill="url(#logo-gradient-1-light)" filter="url(#logo-glow-light)"/>
    <circle cx="75" cy="150" r="4" fill="url(#logo-gradient-2-light)" filter="url(#logo-glow-light)"/>
    <circle cx="25" cy="200" r="4" fill="url(#logo-gradient-1-light)" filter="url(#logo-glow-light)"/>
    <circle cx="75" cy="200" r="4" fill="url(#logo-gradient-2-light)" filter="url(#logo-glow-light)"/>
  </g>

  <!-- HELiX Text -->
  <text x="150" y="130" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="url(#text-gradient-light)" filter="url(#logo-glow-light)">HELiX</text>
</svg>
